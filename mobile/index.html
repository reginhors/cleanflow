function Login({ onLoggedIn, onManager }) {
  const { t, locale, setLocale } = useI18n();
  const [code, setCode] = useState('1001');
  const [pin, setPin] = useState('');
  const [error, setError] = useState(null);
  const press = (d) => {
    if (d === '⌫') return setPin(p => p.slice(0, -1));
    if (pin.length < 6) setPin(p => p + d);
  };
  useEffect(() => {
    if (pin.length === 6) {
      if (pin === '123456' && code === '1001') onLoggedIn();
      else { setError(t('loginError')); setPin(''); }
    }
  }, [pin]); // eslint-disable-line

  return e('main', { className:'min-h-full p-6 pt-10 flex flex-col bg-white text-slate-900 max-w-md mx-auto' },
    e('div', { className:'flex justify-between items-center mb-2' },

      e('div', { className:'flex gap-1' },
        ['nl','en'].map(l => e('button', { key:l, onClick:()=>setLocale(l), style:{ minHeight:32 },

      )
    ),
    e('div', { className:'flex flex-col items-center mt-10 mb-8' },
      e('div', { className:'w-14 h-14 rounded-2xl bg-gom-green flex items-center justify-center text-white font-extrabold text-2xl shadow-md shadow-emerald-200' }, 'G'),
      e('h1', { className:'text-[22px] font-bold text-slate-900 mt-4 tracking-tight' }, t('appTitle')),
      e('p',  { className:'text-slate-500 text-[13px] mt-1' }, t('loginSub'))

    e('label', { className:'block mb-3' },
      e('span', { className:'text-[11px] font-semibold text-slate-500 uppercase tracking-wider' }, t('employeeCode')),
      e('input', {
        value: code, inputMode:'numeric',
        onChange:(ev)=>setCode(ev.target.value.replace(/\D/g,'').slice(0,6)),
        className:'mt-1.5 w-full text-center text-2xl tracking-widest font-semibold rounded-xl border border-slate-200 bg-slate-50 text-slate-900 py-3 focus:bg-white focus:border-gom-green outline-none transition'

    e('div', { className:'flex justify-center gap-2.5 my-4' },
      Array.from({length:6}).map((_,i) =>
        e('div', { key:i, className:`w-3 h-3 rounded-full transition ${i<pin.length ? 'bg-gom-green' : 'bg-slate-200'}` })
      )
    ),

    e('div', { className:'grid grid-cols-3 gap-2 mt-2' },
      ['1','2','3','4','5','6','7','8','9','','0','⌫'].map((d,i) =>
        d === ''
          ? e('div', { key:i })
          : e('button', { key:i, onClick:()=>press(d),
              className:'bg-white border border-slate-200 rounded-xl text-2xl font-medium text-slate-900 py-4 active:bg-slate-50 hover:border-slate-300 transition' }, d)
      )
    ),

    error && e('p', { className:'text-rose-600 text-center text-sm mt-3' }, error),
    e('p', { className:'text-[11px] text-slate-400 text-center mt-auto pt-8' }, 'Pilot · HR Kralingse Zoom · v0.1')
  );
}

function computeCartItems(tasks) {
  const pending = tasks.filter(x => x.status !== 'done' && x.status !== 'skipped');
  const count = (type) => pending.filter(x => x.type === type).length;
  const nToilet    = count('toilet');
  const nClass     = count('classroom') + count('office') + count('meeting');
  const nCorridor  = count('corridor');
  const nKitchen   = count('kitchen');
  const total      = pending.length;
  return [
    { icon:'🧻', label:'Toiletpapier',      qty: nToilet * 2,                  unit:'rollen', show: nToilet > 0 },
    { icon:'🧴', label:'Toiletreiniger',    qty: nToilet > 0 ? 1 : 0,          unit:'fles',   show: nToilet > 0 },
    { icon:'🧽', label:'Microvezeldoekjes', qty: Math.max(3, nClass + nKitchen), unit:'stuks', show: true },
    { icon:'🧴', label:'Allesreiniger',     qty: 1,                            unit:'fles',   show: total > 0 },
    { icon:'🧴', label:'Ontvetter',         qty: nKitchen > 0 ? 1 : 0,         unit:'fles',   show: nKitchen > 0 },
    { icon:'🪣', label:'Mop & emmer',       qty: 1,                            unit:'set',    show: nCorridor + nClass > 0 },
    { icon:'🗑️', label:'Vuilniszakken',     qty: Math.max(4, total),           unit:'stuks',  show: true },
    { icon:'🧤', label:'Handschoenen',      qty: 1,                            unit:'paar',   show: true },
  ].filter(x => x.show);
}

function TrendHistoryScreen() {
  const mt = useMgmtText();
  const [period, setPeriod] = useState('week');
  const series = {
    day:   [24,31,28,42,38,47,35,29,33,51,44,36],
    week:  [210,245,238,302,286,340,318,276,255,301,288,260],
    month: [980,1120,1090,1260,1180,1050,760,720,1410,1500,1320,900]
  }[period];
  const labels = period === 'month' ? MONTH_NAMES : series.map((_, i) => period === 'day' ? `${7+i}:00` : 'W' + (i + 1));
  const max = Math.max(...series), min = Math.min(...series);
  const peakIdx = series.indexOf(max), dipIdx = series.indexOf(min);
  const w = 760, h = 260, pad = 34;
  const points = series.map((v, i) => {

    return { x, y, v, label: labels[i] };

  return e('div', { className:'space-y-4' },

function StarRating({ value, max=5 }) {
  const full = Math.floor(value);
  const half = value - full >= 0.25 && value - full < 0.75;
  return e('span', { className:'inline-flex gap-0.5' },
    Array.from({ length: max }).map((_, i) => {
      const n = i + 1;
      const filled = n <= full;
      const isHalf = !filled && n === full + 1 && half;
      return e('span', { key:i, className: filled ? 'text-amber-400' : isHalf ? 'text-amber-300' : 'text-slate-200', style:{ fontSize:14 } },
        filled || isHalf ? '★' : '☆'
      );
    })
  );
}

function DeviationPill({ expected, actual }) {
  const delta = actual - expected;
  const pct = Math.round((delta / expected) * 100);
  const tone = delta <= 0
    ? 'bg-emerald-50 text-emerald-700'
    : delta / expected > 0.1 ? 'bg-rose-50 text-rose-700' : 'bg-amber-50 text-amber-700';
  return e('span', { className:`inline-flex items-center gap-1 text-[11px] font-semibold px-2 py-0.5 rounded-md ${tone} num` },
    delta <= 0 ? '▼' : '▲', (delta > 0 ? '+' : '') + pct + '%'
  );
}

const MONTH_NAMES = ['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];

// Educatie-patroon: pieken in Sep-Nov en Feb-Mrt, dip in Jul-Aug.
function buildYear(base, factor=1) {
  const pattern = [1100, 1280, 1310, 1180, 1100, 1050, 600, 580, 1450, 1500, 1380, 900];
  const employees = ['Anouk','Fatima','Piotr','Sven','Maria'];
  return MONTH_NAMES.map((m, i) => {
    const rooms = Math.round(pattern[i] * factor + base);
    const top = employees[(i + Math.floor(factor*10)) % employees.length];
    return {
      name: m,
      rooms,
      hours: Math.round(rooms * 0.32),
      issues: Math.round(rooms * 0.012),
      sat: (3.9 + ((i + Math.floor(factor*7)) % 7) * 0.1).toFixed(1),
      topEmp: top,
      topCount: Math.round(rooms * 0.18)
    };
  });
}

function MonthlyBarChart({ months, highlightMax=true }) {
  const max = Math.max(...months.map(m => m.rooms), 1);
  const w = 760, h = 220, padL = 36, padR = 12, padT = 16, padB = 28;
  const barW = (w - padL - padR) / months.length - 6;
  const maxIdx = months.reduce((idx, m, i, arr) => m.rooms > arr[idx].rooms ? i : idx, 0);
  const minIdx = months.reduce((idx, m, i, arr) => (m.rooms > 0 && m.rooms < arr[idx].rooms) ? i : idx, maxIdx);

  return e('div', { className:'bg-white border border-slate-200 rounded-2xl p-5' },
    e('div', { className:'flex items-center justify-between mb-3' },
      e('div', null,
        e('h3', { className:'text-[15px] font-semibold text-slate-900' }, 'Schoonmaak per maand'),
        e('p', { className:'text-[12px] text-slate-500 mt-0.5' }, 'Aantal ruimtes per maand · drukke maanden in groen')
      ),
      e('div', { className:'flex items-center gap-3 text-[11px] text-slate-600' },
        e('span', { className:'inline-flex items-center gap-1.5' },
          e('span', { className:'w-2.5 h-2.5 rounded-sm bg-gom-green' }), 'Drukste maand'
        ),
        e('span', { className:'inline-flex items-center gap-1.5' },
          e('span', { className:'w-2.5 h-2.5 rounded-sm bg-slate-300' }), 'Overig'
        )
      )
    ),
    e('svg', { viewBox: `0 0 ${w} ${h}`, className:'w-full' },
      // grid
      [0, 0.25, 0.5, 0.75, 1].map((t, i) =>
        e('line', { key:i,
          x1: padL, x2: w - padR,
          y1: padT + (1 - t) * (h - padT - padB),
          y2: padT + (1 - t) * (h - padT - padB),
          stroke: '#E2E8F0', strokeWidth: 1, strokeDasharray: i === 0 ? '0' : '3 3'
        })
      ),
      // y-axis labels
      [0, 0.5, 1].map((t, i) =>
        e('text', { key:i,
          x: padL - 6,
          y: padT + (1 - t) * (h - padT - padB) + 4,
          textAnchor: 'end', fontSize: 10, fill:'#94A3B8', fontWeight:600
        }, Math.round(max * t))
      ),
      // bars
      months.map((m, i) => {
        const x = padL + i * ((w - padL - padR) / months.length) + 3;
        const barH = m.rooms === 0 ? 0 : (m.rooms / max) * (h - padT - padB);
        const y = padT + (h - padT - padB) - barH;
        const isMax = highlightMax && i === maxIdx && m.rooms > 0;
        return e('g', { key:i },
          e('rect', {
            x, y, width: barW, height: barH,
            rx: 4,
            fill: isMax ? '#0E7C3A' : (m.rooms === 0 ? '#F1F5F9' : '#CBD5E1')
          }),
          m.rooms > 0 && isMax && e('text', { x: x + barW/2, y: y - 5, textAnchor:'middle',
            fontSize: 10, fontWeight:700, fill:'#0E7C3A' }, m.rooms),
          e('text', { x: x + barW/2, y: h - 8, textAnchor:'middle',
            fontSize: 10, fontWeight: 600,
            fill: isMax ? '#0E7C3A' : '#64748B'
          }, m.name)
        );
      })
    ),
    e('div', { className:'mt-3 grid grid-cols-2 gap-3' },
      e('div', { className:'flex items-start gap-2 text-[12px]' },
        e('span', { className:'inline-flex items-center justify-center w-7 h-7 rounded-lg bg-emerald-50 text-gom-green shrink-0' }, '▲'),
        e('div', null,
          e('p', { className:'font-semibold text-slate-900' }, 'Drukste maand: ' + months[maxIdx].name),
          e('p', { className:'text-slate-500 num' }, months[maxIdx].rooms + ' ruimtes')
        )
      ),
      months[minIdx] && months[minIdx].rooms > 0 && e('div', { className:'flex items-start gap-2 text-[12px]' },
        e('span', { className:'inline-flex items-center justify-center w-7 h-7 rounded-lg bg-slate-50 text-slate-500 shrink-0' }, '▼'),
        e('div', null,
          e('p', { className:'font-semibold text-slate-900' }, 'Rustigste maand: ' + months[minIdx].name),
          e('p', { className:'text-slate-500 num' }, months[minIdx].rooms + ' ruimtes')
        )
      )
    )
  );
}

function HistoryScreen() {
  const years = Object.keys(HISTORY_DATA).map(Number).sort().reverse();
  const [year, setYear] = useState(years[0]);
  const data = HISTORY_DATA[year];
  const months = data.months;

  const totalRooms = months.reduce((s, m) => s + m.rooms, 0);
  const totalHours = months.reduce((s, m) => s + m.hours, 0);
  const totalIssues = months.reduce((s, m) => s + m.issues, 0);
  const satMonths = months.filter(m => typeof m.sat === 'string' && m.sat !== '—');
  const avgSat = satMonths.length ? (satMonths.reduce((s, m) => s + parseFloat(m.sat), 0) / satMonths.length).toFixed(1) : '—';

  // YoY-delta tov vorig jaar
  const prev = HISTORY_DATA[year - 1];
  let yoyDelta = null;
  if (prev) {
    const monthsToCompare = data.full ? 12 : (data.ytdMonths || 12);
    const cur = months.slice(0, monthsToCompare).reduce((s, m) => s + m.rooms, 0);
    const old = prev.months.slice(0, monthsToCompare).reduce((s, m) => s + m.rooms, 0);
    yoyDelta = old > 0 ? Math.round(((cur - old) / old) * 100) : null;
  }

  // Top medewerkers van dit jaar (geaggregeerd over maanden)
  const empAgg = {};
  months.forEach(m => {
    if (m.topEmp && m.topEmp !== '—') {
      empAgg[m.topEmp] = (empAgg[m.topEmp] || 0) + m.topCount;
    }
  });
  const topEmployees = Object.entries(empAgg).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxEmp = topEmployees[0] ? topEmployees[0][1] : 1;

  const locations = LOCATIONS_PER_YEAR[year] || [];

            style:{ minHeight:'auto' }
          }, y)
        )
      )
    ),

    // KPI's
    e('div', { className:'grid grid-cols-4 gap-4' },
      e(StatCard, {
        label: data.full ? 'Ruimtes totaal' : 'Ruimtes (year-to-date)',
        value: totalRooms.toLocaleString('nl-NL'),

function RoomDetail({ task, onBack, onComplete }) {
  const { t } = useI18n();
  const [phase, setPhase] = useState('idle');
  const [elapsed, setElapsed] = useState(0);
  const [score, setScore] = useState(0);
  const [note, setNote] = useState('');
  const startedRef = useRef(0);

  useEffect(() => {
    if (phase !== 'running') return;
    const id = setInterval(() => setElapsed(Date.now() - startedRef.current), 500);
    return () => clearInterval(id);
  }, [phase]);

  const start = () => { startedRef.current = Date.now() - elapsed; setPhase('running'); };
  const pause = () => setPhase('paused');
  const resume = () => { startedRef.current = Date.now() - elapsed; setPhase('running'); };
  const stop = () => setPhase('finishing');
  const fmt = (ms) => {
    const s = Math.floor(ms/1000);
    return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
  };

  const Header = e('header', { className:'px-5 pt-12 pb-5 bg-white border-b border-slate-200/80' },
    e('button', { onClick:onBack, className:'inline-flex items-center gap-1 text-[13px] text-slate-500 hover:text-slate-900', style:{minHeight:'auto'} },
      IC.arrowLeft, t('back')
    ),
    e('div', { className:'flex items-start justify-between mt-2 gap-3' },
      e('div', null,
        e('h1', { className:'text-2xl font-bold text-slate-900 tracking-tight' }, task.name),
        e('p', { className:'text-[13px] text-slate-500 mt-0.5' }, task.sub + ' · ' + t('wing') + ' ' + task.wing)
      ),
      e(Pill, { band: task.band })
    )
  );

  if (phase === 'finishing') {
    return e('main', { className:'min-h-full max-w-md mx-auto pb-10' },
      Header,
      e('section', { className:'p-5 space-y-5' },
        e('p', { className:'text-[12px] text-slate-500 inline-flex items-center gap-1.5' }, IC.clockBox, e('span', { className:'num' }, Math.max(1, Math.round(elapsed/60000))), ' ' + t('minutes')),
        e('div', null,
          e('p', { className:'font-semibold mb-2 text-slate-800 text-[14px]' }, t('preSat')),
          e('div', { className:'flex justify-between gap-1.5' },
            [1,2,3,4,5].map(n =>
              e('button', { key:n, onClick:()=>setScore(n),
                className:`flex-1 text-2xl rounded-xl py-3 border transition ${score===n?'bg-gom-greenSoft border-gom-green ring-2 ring-gom-green/20':'bg-white border-slate-200 hover:border-slate-300'}` },
                ['😖','😕','😐','🙂','😀'][n-1])
            )
          )
        ),
        e('label', { className:'block' },
          e('span', { className:'font-semibold text-slate-800 text-[14px]' }, t('note')),
          e('textarea', { value:note, onChange:(ev)=>setNote(ev.target.value), rows:3, placeholder:t('notePh'),
            className:'mt-1.5 w-full rounded-xl border border-slate-200 p-3 bg-white text-[14px] focus:border-gom-green outline-none' })
        ),
        e('button', { className:'w-full rounded-xl border border-dashed border-slate-300 py-4 text-slate-500 text-[13px] inline-flex items-center justify-center gap-2 hover:bg-slate-50' },
          IC.camera, t('photo')
        ),
        e('div', { className:'grid grid-cols-2 gap-3 pt-2' },
          e(Button, { variant:'outline', onClick:()=>setPhase('paused') }, t('cancel')),
          e(Button, { variant:'primary', onClick:()=>onComplete({ score: score||3, note }) }, IC.check, t('confirm'))
        )
      )
    );
  }

  return e('main', { className:'min-h-full max-w-md mx-auto pb-10' },
    Header,
    e('section', { className:'px-5 pt-3' },
      e('div', { className:'flex items-center justify-between text-[12px] text-slate-500' },
        e('span', { className:'inline-flex items-center gap-1.5' }, IC.clockBox, t('expectedTime')),
        e('span', { className:'num font-semibold text-slate-700' }, task.minutes + ' ' + t('minutes'))
      )
    ),
    e('section', { className:'px-5 mt-10 flex flex-col items-center' },
      e('p', { className:'text-[10px] uppercase tracking-[0.2em] text-slate-400 font-semibold' }, t('timer')),
      e('div', { className:'text-[80px] leading-none font-bold num tracking-tight mt-3 text-slate-900' }, fmt(elapsed)),

      e('div', { className:'mt-12 w-full space-y-3' },
        phase === 'idle' && e('button', {
          onClick:start,
          className:'w-full bg-gom-green hover:bg-gom-greenDark text-white text-xl font-bold rounded-2xl py-7 shadow-lg shadow-emerald-200/50 inline-flex items-center justify-center gap-3 transition'
        }, IC.play, t('start')),

        phase === 'running' && e('div', { className:'grid grid-cols-2 gap-3' },
          e(Button, { variant:'outline', onClick:pause, className:'text-[15px] py-5' }, IC.pause, t('pause')),
          e(Button, { variant:'primary', onClick:stop,  className:'text-[15px] py-5' }, IC.check, t('stop'))
        ),

        phase === 'paused' && e('div', { className:'grid grid-cols-2 gap-3' },
          e(Button, { variant:'primary', onClick:resume, className:'text-[15px] py-5' }, IC.play, t('resume')),
          e(Button, { variant:'outline', onClick:stop, className:'text-[15px] py-5' }, IC.check, t('stop'))
        )
      )
    )
  );
}

function Summary() {
  const { t } = useI18n();
  const SHIFT_START_H = 7, SHIFT_END_H = 12; // 07:00 → 12:00

  const [now, setNow] = useState(() => new Date());
  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);

  // Voor de demo: klem de "voortgang" in de dienst tussen 0 en 100% obv echte klok,
  // maar als je buiten dienst bekijkt, fallback op 65% (≈10:15) zodat de waarden kloppen.
  const startMs = new Date(now); startMs.setHours(SHIFT_START_H,0,0,0);
  const endMs   = new Date(now); endMs.setHours(SHIFT_END_H,0,0,0);
  const inShift = now >= startMs && now <= endMs;
  const clockedMs    = inShift ? (now - startMs)  : (endMs - startMs) * 0.65;
  const remainingMs  = inShift ? (endMs - now)    : (endMs - startMs) * 0.35;
  const shiftPct     = Math.round((clockedMs / (endMs - startMs)) * 100);

  const fmtHM = (ms) => {
    const m = Math.max(0, Math.round(ms / 60000));
    const h = Math.floor(m / 60);
    const mm = m % 60;
    return h > 0 ? `${h}u ${String(mm).padStart(2,'0')}m` : `${mm}m`;
  };
  const hhmm = (d) => String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');

  // Mock-tevredenheid van afgeronde ruimtes vandaag (gem. 4.0)
  const satisfactions = [4, 5, 3, 4]; // 4 ruimtes klaar
  const avg = satisfactions.reduce((a,b)=>a+b,0) / satisfactions.length;
  const fullStars = Math.floor(avg);
  const halfStar  = avg - fullStars >= 0.25 && avg - fullStars < 0.75;

  return e('main', { className:'min-h-full pb-24 max-w-md mx-auto' },
    e('header', { className:'px-5 pt-12 pb-5 bg-white border-b border-slate-200/80' },
      e('div', { className:'flex items-start justify-between gap-3' },
        e('div', null,
          e('div', { className:'inline-flex items-center justify-center w-10 h-10 rounded-xl bg-gom-greenSoft text-gom-green mb-3' }, IC.chart),
          e('h1', { className:'text-2xl font-bold text-slate-900 tracking-tight' }, t('summaryTitle')),
          e('p', { className:'text-[13px] text-slate-500 mt-1' }, now.toLocaleDateString('nl-NL',{ weekday:'long', day:'numeric', month:'long' }))
        ),
        e('div', { className:'text-right' },
          e('p', { className:'text-[10px] font-semibold text-slate-400 uppercase tracking-wider' }, t('now')),
          e('p', { className:'text-2xl font-bold text-slate-900 num leading-none mt-1' }, hhmm(now))
        )
      )
    ),

    e('section', { className:'p-5 space-y-3' },

      // Dienst-kaart
      e(Card, { className:'p-4' },
        e('div', { className:'flex items-center justify-between' },
          e('div', null,
            e('p', { className:'text-[11px] font-semibold text-slate-500 uppercase tracking-wider' }, t('shift')),
            e('p', { className:'text-[15px] font-semibold text-slate-900 mt-1 num inline-flex items-center gap-1.5' },
              IC.clockBox,
              `${String(SHIFT_START_H).padStart(2,'0')}:00 — ${String(SHIFT_END_H).padStart(2,'0')}:00`
            )
          ),
          e('span', { className:'text-[11px] font-medium num text-slate-500' }, shiftPct + '%')
        ),
        e('div', { className:'h-1.5 bg-slate-100 rounded-full overflow-hidden mt-3' },
          e('div', { className:'h-full bg-gom-green rounded-full transition-all', style:{ width:`${Math.min(100,Math.max(0,shiftPct))}%` } })
        ),
        e('div', { className:'grid grid-cols-2 gap-3 mt-4' },
          e('div', null,
            e('p', { className:'text-[10px] font-semibold text-slate-400 uppercase tracking-wider' }, t('clockedIn')),
            e('p', { className:'text-xl font-bold text-slate-900 num mt-0.5' }, fmtHM(clockedMs))
          ),
          e('div', { className:'text-right' },
            e('p', { className:'text-[10px] font-semibold text-slate-400 uppercase tracking-wider' }, t('remaining')),
            e('p', { className:'text-xl font-bold text-gom-green num mt-0.5' }, fmtHM(remainingMs))
          )
        )
      ),

      // KPI grid
      e('div', { className:'grid grid-cols-2 gap-3' },
        e(Card, { className:'p-4' },
          e('p', { className:'text-[11px] font-semibold text-slate-500 uppercase tracking-wider' }, t('roomsDone')),
          e('p', { className:'text-3xl font-bold text-slate-900 mt-2 num' },
            '4', e('span', { className:'text-base text-slate-400 font-medium' }, '/6'))
        ),
        e(Card, { className:'p-4' },
          e('p', { className:'text-[11px] font-semibold text-slate-500 uppercase tracking-wider' }, t('totalTime')),
          e('p', { className:'text-3xl font-bold text-slate-900 mt-2 num' },
            '52', e('span', { className:'text-base text-slate-400 font-medium' }, ' min'))
        )
      ),

      // Gemiddelde tevredenheid
      e(Card, { className:'p-4' },
        e('div', { className:'flex items-center justify-between' },
          e('div', null,
            e('p', { className:'text-[11px] font-semibold text-slate-500 uppercase tracking-wider' }, t('avgSat')),
            e('p', { className:'text-3xl font-bold text-slate-900 num mt-1' },
              avg.toFixed(1), e('span', { className:'text-base text-slate-400 font-medium' }, '/5')
            )
          ),
          e('div', { className:'flex gap-0.5 text-xl' },
            [1,2,3,4,5].map(n => {
              const filled = n <= fullStars;
              const half = !filled && n === fullStars + 1 && halfStar;
              return e('span', { key:n, className: filled ? 'text-amber-400' : (half ? 'text-amber-300' : 'text-slate-200') },
                filled ? '★' : (half ? '★' : '☆')
              );
            })
          )
        ),
        e('p', { className:'text-[11px] text-slate-400 mt-2' }, satisfactions.length + ' ' + t('roomsDone').toLowerCase())
      ),

      // Team-week-bericht (geaggregeerd, geen individu)
      e(Card, { className:'p-4 bg-gom-greenSoft border-emerald-200' },
        e('div', { className:'flex items-start gap-3' },
          e('span', { className:'text-gom-green mt-0.5' }, IC.sparkle),
          e('p', { className:'text-[13px] text-emerald-900 leading-relaxed' }, t('teamWeek'))
        )
      )
    )
  );
}

/* ───────────── App ───────────── */
// AI-volgorde: hoge vraag eerst, gegroepeerd per vleugel, lage vraag aan einde.
const OPTIMIZED_ORDER = ['t2','t1','t4','t3','t6','t5'];

function App() {
  // mode: cleanerLogin | managerLogin | cleaner | manager
  const [mode, setMode] = useState('cleanerLogin');
  const [tab, setTab] = useState('plan');
  const [tasks, setTasks] = useState(() => TASKS.map(x => ({ ...x, status: 'pending' })));
  const [activeTask, setActiveTask] = useState(null);
  const [optimized, setOptimized] = useState(false);
  const [optimizing, setOptimizing] = useState(false);

  const onOptimize = () => {
    setOptimizing(true);
    setTimeout(() => {
      setTasks(curr => {
        const byId = new Map(curr.map(t => [t.id, t]));
        return OPTIMIZED_ORDER.map(id => byId.get(id)).filter(Boolean);
      });
      setOptimized(true);
      setOptimizing(false);
    }, 1900);
  };
  const onReset = () => {
    setTasks(curr => {
      const byId = new Map(curr.map(t => [t.id, t]));
      return TASKS.map(x => byId.get(x.id)).filter(Boolean);
    });
    setOptimized(false);
  };

  if (mode === 'cleanerLogin') return e(Login, {
    onLoggedIn: () => setMode('cleaner'),
    onManager: () => setMode('managerLogin')
  });
  if (mode === 'managerLogin') return e(ManagerLogin, {
    onLoggedIn: () => setMode('manager'),
    onBack: () => setMode('cleanerLogin')
  });
  if (mode === 'manager') return e(ManagementDashboard, {
    onLogout: () => setMode('cleanerLogin')
  });

  if (activeTask) {
    return e(React.Fragment, null,
      e('div', { className:'fixed top-2 right-2 z-50' }, e(LanguageSwitch)),
      e(RoomDetail, {
        task: activeTask,
        onBack: () => setActiveTask(null),
        onComplete: () => {
          setTasks(ts => ts.map(t => t.id===activeTask.id ? {...t, status:'done'} : t));
          setActiveTask(null);
        }
      })
    );
  }

  const view =
    tab === 'plan'      ? e(DayPlan, {
      tasks, optimized, optimizing,
      onOptimize, onReset,
      onLogout: ()=>setMode('cleanerLogin'),
      onOpen: (id)=>setActiveTask(tasks.find(t=>t.id===id))
    }) :
    tab === 'assistant' ? e(Assistant) :
    tab === 'summary'   ? e(Summary) :
    tab === 'measure'   ? e(WhatWeMeasure) : null;

  return e(React.Fragment, null,
    e('div', { className:'fixed top-2 right-12 z-50' }, e(LanguageSwitch)),
    view,
    e(TabBar, { active: tab, onChange: setTab })
  );
}

createRoot(document.getElementById('app')).render(
  e(I18nProvider, null, e(App, null))
);
</script>
